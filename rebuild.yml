name: Rebuild dashboard from updated data

on:
  push:
    paths:
      - 'data/**'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Extract data from spreadsheet
        run: python extract_data2.py

      - name: Build dashboard HTML
        run: python build_dashboard6.py

      - name: Commit and push rebuilt site
        run: |
          git config user.name "jaxstate-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html roster_data2.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-rebuild dashboard from updated data"
            git push
          fi
